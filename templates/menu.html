{% extends "base.html" %}

{% block content %}
  <h1 class="text-center mb-5" style="color: var(--gold); font-family: 'Playfair Display', serif;">
    الأقسام
  </h1>

  <div class="category-grid">
    {% for cat in categories %}
      <a href="{{ url_for('category', cat_id=cat.id) }}" class="card-link">
        <div class="card">
          <div class="card-body">
            <h3 class="card-title">{{ cat.name }}</h3>
          </div>
        </div>
      </a>
    {% endfor %}
  </div>
{% endblock %}
