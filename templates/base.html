<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mavi House - تجربة فاخرة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-S..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  
</head>
<body>
  <header class="luxury-header">
    <div class="logo">Mavi House</div>
    <div class="table-info">طاولة رقم {{ table|default(1) }}</div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

<!-- سلة عائمة -->
<div class="cart-float" id="cart-float">
    <i class="fas fa-shopping-cart"></i>
    <span id="cart-count">0</span>
</div>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- main.js -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
